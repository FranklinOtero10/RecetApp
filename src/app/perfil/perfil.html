
<div *ngIf="cargando" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">Cargando perfil...</p>
    </div> 

<div *ngIf="!cargando" class="container mt-5">
  <div class="row justify-content-center">


    <div class="col-md-8">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">

        <!-- src="https://cdn-icons-png.flaticon.com/512/12225/12225881.png" -->
          <!-- Imagen de perfil -->
          <div class="text-center mb-4">
            <img
              
              [src]="data?.image" 
              alt="Perfil"
              class="rounded-circle border border-3"
              width="150"
              height="150"
            >
          </div>

          <!-- Título -->
          <h2 class="text-center mb-4">Perfil de Usuario</h2>
          <div class="row">

                <!-- Nombre completo -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Nombre Completo</label>
              <input 
                type="text" 
                class="form-control" 
                [value] = "data?.firstName + ' ' + data?.lastName"
                readonly
                >
            </div>

            <!-- Nombre de usuario -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Nombre de Usuario</label>
              <input 
                type="text" 
                class="form-control" 
                [value]= "data?.username"
                readonly
              >
            </div>

            <!-- Email -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Email</label>
              <input 
                type="email" 
                class="form-control" 
                [value]= "data?.email"
                readonly
              >
            </div>

            <!-- Edad -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Edad</label>
              <input 
                type="number" 
                class="form-control" 
                [value]= "data?.age"
                readonly
              >
            </div>

            <!-- Celular -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Celular</label>
              <input 
                type="text" 
                class="form-control" 
                [value]= "data?.phone"
                readonly
              >
            </div>

            <!-- Fecha de nacimiento -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Fecha de nacimiento</label>
              <input 
                type="text" 
                class="form-control" 
                [value]= "data?.birthDate"
                readonly
              >
            </div>
            </div>


          <!-- Botón -->
          <div class="text-center mt-4">
            <a routerLink="/recipes" class="btn btn-outline-info px-4">
                <i class="bi bi-arrow-left me-1"></i> Volver
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
